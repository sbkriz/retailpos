name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lint-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Expo
      uses: expo/expo-github-action@v8

    - name: Select Xcode 26.2
      if: matrix.os == 'macos-26'
      run: sudo xcode-select -s /Applications/Xcode_26.2.app

    - name: Verify Xcode version
      if: matrix.os == 'macos-26'
      run: xcodebuild -version

    - name: Install dependencies
      run: yarn install --frozen-lockfile --network-timeout 100000 --network-concurrency 1 --mutex file
      env:
        YARN_CACHE_FOLDER: ${{ runner.temp }}/yarn-cache

    - name: Setup environment
      run: cp .env.example .env

    - name: Run Expo Doctor
      run: npx expo-doctor@latest --verbose
      env:
        EXPO_DOCTOR_SKIP_DEPENDENCY_VERSION_CHECK: 1

    - name: Run linting
      run: yarn lint

    - name: Run tests
      run: yarn test --coverage --watchAll=false

    - name: Build Electron app (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: yarn desktop:build-linux

    - name: Build Electron app (macOS)
      if: matrix.os == 'macos-26'
      run: yarn desktop:build-mac

    - name: Build Electron app (Windows)
      if: matrix.os == 'windows-latest'
      run: yarn desktop:build-win

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: electron-build-${{ matrix.os }}
        path: dist-electron/
